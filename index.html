<!doctype html><html lang="hy"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>7 հրաշալիքներ</title><style>body{margin:0;font-family:Arial;background:#101010;color:white;padding:18px}h1{text-align:center;color:#ffd166}.q{background:#1e1e1e;border:1px solid #444;border-radius:14px;padding:14px;margin:14px 0}button{display:block;width:100%;padding:12px;margin:8px 0;border:0;border-radius:10px;background:#333;color:white;font-size:16px}.ok{background:#168a16!important}.bad{background:#b51616!important}#res{text-align:center;font-size:22px;margin:20px;color:#ffd166}.again{background:#d49b22}</style></head><body><h1>7 հրաշալիքներ Quiz</h1><div id="app"></div><div id="res"></div><button class="again" onclick="location.reload()">Նորից սկսել</button><script>let s=0,a=[['7 հրաշալիքներից որն է գտնվում Եգիպտոսում',['ա) Բաբելոնի կախովի այգիները','բ) Պետրա','գ) Գիզայի Մեծ բուրգ'],2],['Որ ծովի ափին է գտնվում Հալիկառնասի դամբարանը',['ա) Սև ծով','բ) Էգեյան ծով','գ) Միջերկրական ծով'],1],['Ում պատվին էր կառուցվել Արտեմիսի տաճարը',['ա) Զևսի','բ) Արտեմիսի','գ) Ապոլոնի'],1],['Որտեղ է գտնվում Ալեքսանդրիայի փարոսը',['ա) Հռոմում','բ) Աթենքում','գ) Ալեքսանդրիայում'],2],['Որ հրաշալիքն էր կառուցվել որպես հսկա աստվածային արձան',['ա) Զևսի արձանը','բ) Ալեքսանդրիայի փարոս','գ) Հալիկառնասի դամբարան'],0]];app.innerHTML=a.map((x,i)=>`<div class=q><h3>${i+1}. ${x[0]}</h3>${x[1].map((b,j)=>`<button onclick="c(this,${i},${j})">${b}</button>`).join('')}</div>`).join('');function c(b,i,j){let p=b.parentNode,bs=p.querySelectorAll('button');bs.forEach((e,k)=>{e.disabled=1;if(k==a[i][2])e.classList.add('ok')});if(j==a[i][2])s++;else b.classList.add('bad');res.innerHTML='Արդյունք՝ '+s+' / '+a.length}</script></body></html>
